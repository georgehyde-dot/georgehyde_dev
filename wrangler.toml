name = "georgehyde-dev"
main = "dist/_worker.js/index.js"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"


# Custom domain routing
routes = [
    { pattern = "georgehyde.dev/*", zone_name = "georgehyde.dev" },
    { pattern = "georgehyde.dev", custom_domain = true },
]

# Environment variables (if needed)
[vars]
ENVIRONMENT = "production"
# Public Clerk key — safe to commit, it's a browser-facing publishable key (not the secret key)
PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_Y29ycmVjdC13aGlwcGV0LTg5LmNsZXJrLmFjY291bnRzLmRldiQ"

# Build configuration
[build]
command = "npm run build"
